<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Message envoyé — Ouattware</title>
  <meta name="description" content="Votre message a bien été envoyé. Merci de votre confiance.">
  <meta name="robots" content="noindex">

  <!-- Favicons -->
  <link href="assets/img/logo.png" rel="icon">
  <link href="assets/img/ouattware.jpg" rel="apple-touch-icon">

  <!-- Fonts (mêmes familles que le site) -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Roboto:wght@300;400;500&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ===== Tokens repris de assets/css/main.css ===== */
    :root {
      --bg: #faf9f5;
      --text: #3d3929;
      --heading: #141413;
      --accent: #c96442;
      --surface: #ffffff;
      --contrast: #ffffff;
      --muted: color-mix(in srgb, var(--text), transparent 42%);
      --hairline: color-mix(in srgb, var(--heading), transparent 90%);
      --heading-font: "Raleway", sans-serif;
      --body-font: "Roboto", system-ui, sans-serif;
      --nav-font: "Poppins", sans-serif;
      --redirect: 6s;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #262624;
        --text: #c3c0b6;
        --heading: #faf9f5;
        --accent: #d97757;
        --surface: #30302e;
        --hairline: color-mix(in srgb, #ffffff, transparent 90%);
      }
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: var(--body-font);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Halo ambiant en arrière-plan, teinté accent */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(60% 55% at 50% 38%, color-mix(in srgb, var(--accent), transparent 88%), transparent 70%);
      pointer-events: none;
    }

    /* ===== Carte ===== */
    .card {
      position: relative;
      width: min(100%, 480px);
      background: var(--surface);
      border-radius: 28px;
      padding: 48px 40px 36px;
      text-align: center;
      box-shadow:
        0 1px 1px rgba(20, 20, 19, 0.04),
        0 8px 20px -8px rgba(20, 20, 19, 0.14),
        0 30px 60px -24px rgba(201, 100, 66, 0.20);
      opacity: 0;
      transform: translateY(14px);
      animation: card-in 0.7s cubic-bezier(0.2, 0, 0, 1) forwards;
    }

    /* ===== Sceau signature : orbite + coche ===== */
    .seal {
      --size: 128px;
      position: relative;
      width: var(--size);
      height: var(--size);
      margin: 0 auto 26px;
    }

    /* Anneau orbital qui rappelle le hero (dev-orbit) */
    .seal__orbit {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1.5px dashed color-mix(in srgb, var(--accent), transparent 55%);
      animation: spin 14s linear infinite;
    }
    .seal__orbit::after {
      content: "";
      position: absolute;
      top: -5px; left: 50%;
      width: 9px; height: 9px;
      margin-left: -4.5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent), transparent 82%);
    }

    /* Onde qui pulse une fois */
    .seal__pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent), transparent 78%);
      transform: scale(0.6);
      opacity: 0;
      animation: pulse 1.4s ease-out 0.5s;
    }

    .seal__disc {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(120% 120% at 50% 20%,
                  color-mix(in srgb, var(--accent), #ffffff 12%),
                  var(--accent));
      box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.35),
                  0 12px 24px -8px color-mix(in srgb, var(--accent), transparent 45%);
      transform: scale(0);
      animation: pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s forwards;
    }

    .seal__check {
      width: 58%;
      height: 58%;
    }
    .seal__check path {
      fill: none;
      stroke: var(--contrast);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: draw 0.45s cubic-bezier(0.65, 0, 0.35, 1) 0.7s forwards;
    }

    /* ===== Texte ===== */
    .eyebrow {
      font-family: var(--nav-font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 10px;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.5s;
    }

    h1 {
      font-family: var(--heading-font);
      font-weight: 800;
      font-size: clamp(1.7rem, 5vw, 2.15rem);
      line-height: 1.12;
      color: var(--heading);
      margin: 0 0 12px;
      text-wrap: balance;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.6s;
    }

    .lead {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 auto 28px;
      max-width: 34ch;
      text-wrap: pretty;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.72s;
    }
    .lead strong { color: var(--text); font-weight: 500; }

    /* ===== Compte à rebours ===== */
    .timer {
      opacity: 0;
      animation: rise 0.6s ease forwards 0.84s;
    }
    .timer__track {
      height: 4px;
      border-radius: 99px;
      background: var(--hairline);
      overflow: hidden;
    }
    .timer__fill {
      height: 100%;
      width: 100%;
      transform-origin: left;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent), #ffffff 30%));
      animation: drain var(--redirect) linear 0.9s forwards;
    }
    .timer__label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .timer__label b {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      font-weight: 600;
    }

    /* ===== Actions ===== */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 26px;
      opacity: 0;
      animation: rise 0.6s ease forwards 0.96s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 14px;
      font-family: var(--nav-font);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition-property: transform, box-shadow, background-color, color;
      transition-duration: 180ms;
      transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
    }
    .btn:active { transform: scale(0.96); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .btn--primary {
      background: var(--accent);
      color: var(--contrast);
      box-shadow: 0 8px 18px -8px color-mix(in srgb, var(--accent), transparent 40%);
    }
    .btn--primary:hover {
      background: color-mix(in srgb, var(--accent), #000 8%);
      box-shadow: 0 10px 22px -8px color-mix(in srgb, var(--accent), transparent 30%);
    }
    .btn--ghost {
      background: transparent;
      color: var(--text);
      box-shadow: inset 0 0 0 1.5px var(--hairline);
    }
    .btn--ghost:hover { color: var(--accent); box-shadow: inset 0 0 0 1.5px var(--accent); }

    /* ===== Keyframes ===== */
    @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { to { transform: scale(1); } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%   { transform: scale(0.6); opacity: 0.9; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes drain { to { transform: scaleX(0); } }

    /* Accessibilité : mouvement réduit */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .card, .eyebrow, h1, .lead, .timer, .actions { opacity: 1; transform: none; }
      .seal__disc { transform: scale(1); }
      .seal__check path { stroke-dashoffset: 0; }
      .timer__fill { display: none; }
    }
  </style>
</head>

<body>
  <main class="card" role="status" aria-live="polite">
    <div class="seal" aria-hidden="true">
      <span class="seal__orbit"></span>
      <span class="seal__pulse"></span>
      <span class="seal__disc">
        <svg class="seal__check" viewBox="0 0 60 60">
          <path d="M16 31 L26 41 L45 20" />
        </svg>
      </span>
    </div>

    <p class="eyebrow">Message reçu</p>
    <h1>Merci, c'est envoyé&nbsp;!</h1>
    <p class="lead">Votre message est bien arrivé dans ma boîte. <strong>Je vous réponds au plus vite.</strong></p>

    <div class="timer">
      <div class="timer__track"><div class="timer__fill"></div></div>
      <span class="timer__label">Retour au formulaire dans <b id="count">6</b>&nbsp;s…</span>
    </div>

    <div class="actions">
      <a class="btn btn--primary" href="contact.html">Retour au formulaire</a>
      <a class="btn btn--ghost" href="index.html">Accueil</a>
    </div>
  </main>

  <script>
    (function () {
      var target = "contact.html";
      var seconds = 6;
      var el = document.getElementById("count");
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var tick = setInterval(function () {
        seconds -= 1;
        if (el) el.textContent = seconds < 0 ? 0 : seconds;
        if (seconds <= 0) clearInterval(tick);
      }, 1000);

      setTimeout(function () {
        window.location.href = target;
      }, reduce ? 1500 : 6900);
    })();
  </script>
</body>

</html>
